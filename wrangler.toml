name = "dreclaw"
main = "src/cloudflare/index.ts"
compatibility_date = "2026-02-22"
compatibility_flags = ["nodejs_compat"]
route = "dreclaw.thevantonders.com/*"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE_MEMORY"
index_name = "dreclaw-memory"

[[worker_loaders]]
binding = "LOADER"

[observability]
enabled = true

[[d1_databases]]
binding = "DRECLAW_DB"
database_name = "dreclaw"
database_id = "24da6057-43e2-4997-a96d-843b746ab001"

[[workflows]]
name = "dreclaw-conversation"
binding = "CONVERSATION_WORKFLOW"
class_name = "ConversationWorkflow"

[limits]
cpu_ms = 300_000

[[migrations]]
tag = "v4"
deleted_classes = ["SessionRuntime"]
