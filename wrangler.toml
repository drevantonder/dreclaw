name = "dreclaw"
main = "src/cloudflare/index.ts"
compatibility_date = "2026-02-22"
compatibility_flags = ["nodejs_compat"]
route = "dreclaw.thevantonders.com/*"

[vars]
USER_TIMEZONE = "Australia/Brisbane"
PROFILING_ENABLED = "true"
PROFILING_SAMPLE_RATE = "1"
AI_PROVIDER = "opencode-go"
MODEL = "kimi-k2.5"
LIVE_TEST_SCENARIOS_ENABLED = "false"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE_MEMORY"
index_name = "dreclaw-memory"

[[worker_loaders]]
binding = "LOADER"

[observability]
enabled = true

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DRECLAW_DB"
database_name = "dreclaw"
database_id = "24da6057-43e2-4997-a96d-843b746ab001"

[[workflows]]
name = "dreclaw-conversation"
binding = "CONVERSATION_WORKFLOW"
class_name = "ConversationWorkflow"

[[workflows]]
name = "dreclaw-reminders-wake"
binding = "REMINDERS_WAKE_WORKFLOW"
class_name = "RemindersWakeWorkflow"

[limits]
cpu_ms = 300_000

[[migrations]]
tag = "v4"
deleted_classes = ["SessionRuntime"]

[env.staging]
name = "dreclaw-staging"
workers_dev = true
routes = []

[env.staging.ai]
binding = "AI"

[[env.staging.vectorize]]
binding = "VECTORIZE_MEMORY"
index_name = "dreclaw-memory"

[[env.staging.worker_loaders]]
binding = "LOADER"

[env.staging.vars]
USER_TIMEZONE = "Australia/Brisbane"
PROFILING_ENABLED = "true"
PROFILING_SAMPLE_RATE = "1"
AI_PROVIDER = "opencode-go"
MODEL = "kimi-k2.5"
LIVE_TEST_SCENARIOS_ENABLED = "true"

[[env.staging.d1_databases]]
binding = "DRECLAW_DB"
database_name = "dreclaw-staging"
database_id = "a6692b7f-b099-4504-9a40-12853db41c02"

[[env.staging.workflows]]
name = "dreclaw-staging-conversation"
binding = "CONVERSATION_WORKFLOW"
class_name = "ConversationWorkflow"

[[env.staging.workflows]]
name = "dreclaw-staging-reminders-wake"
binding = "REMINDERS_WAKE_WORKFLOW"
class_name = "RemindersWakeWorkflow"

[[env.staging.migrations]]
tag = "v1"
